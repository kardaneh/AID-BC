name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[ci,dev]"

      - name: Run pre-commit
        run: |
          source .venv/bin/activate
          pre-commit run --all-files

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          python -m unittest tests.test_dataset
          python -m unittest tests.test_logger
          python -m unittest tests.test_preprocess
          python -m unittest tests.test_quantile_mapping

      - name: Check package builds
        run: uv build

      - name: Basic import test
        run: |
          source .venv/bin/activate
          python -c "
          import AID_BC
          print(f'✅ AID_BC version: {AID_BC.__version__}')
          print('✅ Basic imports work')
          "
